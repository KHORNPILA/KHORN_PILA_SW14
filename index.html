<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>using bootstrap form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="bootstrap.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
   <div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="row w-100">
        <form id="userForm" class="w-100">
        <div class="col-4 shadow p-3 mb-5 bg-body rounded mx-auto">
            <h3 class="text-danger">USER INFORMSTION</h3>
            <label for="Full Name" class="form-label">FullName</label>
            <div class="input-group mb-3">
                <span class="input-group-text text-primary"><i class="bi bi-person-circle"></i></span>
                <input type="text" class="form-control" id="fullName" placeholder="Enter your fullname">
            </div>
            <div class="mb-3">
                <label for="gender" class="form-label ">Gender</label>
                 <div class="form-check form-check-inline">
                    
                    <input type="radio" name="gender" id="male" value="male" class="form-check-input" checked>
                    <label for="male" class="form-check-label">Male</label>
                 </div>
                 <div class="form-check form-check-inline">
                    <input type="radio" name="gender" id="female" value="female" class="form-check-input">
                    <label for="female" class="form-check-label">Female</label>
                 </div>
            </div>
            <div class="mb-3">
                <label for="salary" class="form-label">Salary</label>
                <div class="input-group">
                    <span class="input-group-text text-success"><i class="bi bi-coin"></i></span>
                    <input type="number" class="form-control" id="salary" placeholder="Enter your salary">
                </div>
            </div>
            <div class="mb-3">
                                <label for="dob" class="form-label">Date of birth</label>
                                <input type="date" class="form-control" id="dob">
                            </div>
                            <div class="mb-3">
                                <label for="position" class="form-label">Position</label>
                                <div class="input-group">
                                    <span class="input-group-text text-info"><i class="bi bi-briefcase"></i></span>
                                    <select class="form-select" id="position">
                                        <option value="0" selected>choose your position</option>
                                        <option value="IT Support">IT Support</option>
                                        <option value="IT Manager">IT Manager</option>
                                        <option value="Designer">Designer</option>
                                        <option value="Developer">Developer</option>
                                        <option value="Tester">Tester</option>
                                    </select>
                                </div>
                            </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea name="description" id="description" class="form-control" rows="2"></textarea>
                        </div>
                                   
            <button type="submit" class="btn btn-primary mt-2 me-3 w-25">Submit</button>
            <button type="reset" class="btn btn-outline-danger mt-2  w-25 ">Reset</button>
            </div>
           
        </form>
        <div class="mb-3" id="result"></div>
         
    </div>
    
   
   </div>   
    






</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="..//JS/bootrap.js"></script>
</html>
